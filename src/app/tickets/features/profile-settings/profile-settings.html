<div class="min-h-screen bg-gray-50 dark:bg-gray-900">
  <div class="container mx-auto px-4 py-8 max-w-2xl">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <button
        (click)="goBack()"
        class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-white transition-colors">
        ← Volver
      </button>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
        Configuración de perfil
      </h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow">
      <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Datos personales</h2>
      </div>

      <form (ngSubmit)="saveProfile()" class="px-6 py-6 space-y-6">

        <!-- Nombre completo -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Nombre completo
          </label>
          <input
            type="text"
            [(ngModel)]="fullName"
            name="fullName"
            placeholder="Tu nombre completo"
            class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Email
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
            Si cambias el email, recibirás un correo de confirmación.
          </p>
        </div>

        <!-- Separador -->
        <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
          <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Cambiar contraseña</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Déjalo en blanco si no quieres cambiar la contraseña.</p>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                Nueva contraseña
              </label>
              <input
                type="password"
                [(ngModel)]="newPassword"
                name="newPassword"
                placeholder="Nueva contraseña"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                Confirmar nueva contraseña
              </label>
              <input
                type="password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                placeholder="Repite la nueva contraseña"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
          </div>
        </div>

        <!-- Mensajes de feedback -->
        @if (successMessage) {
          <div class="bg-green-50 dark:bg-green-900 border border-green-200 dark:border-green-700 rounded-lg px-4 py-3 text-green-700 dark:text-green-200 text-sm">
            ✅ {{ successMessage }}
          </div>
        }
        @if (errorMessage) {
          <div class="bg-red-50 dark:bg-red-900 border border-red-200 dark:border-red-700 rounded-lg px-4 py-3 text-red-700 dark:text-red-200 text-sm">
            ❌ {{ errorMessage }}
          </div>
        }

        <!-- Botón guardar -->
        <div class="flex justify-end">
          <button
            type="submit"
            [disabled]="isLoading"
            class="bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white px-6 py-2 rounded-lg font-medium transition-colors">
            @if (isLoading) {
              Guardando...
            } @else {
              Guardar cambios
            }
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
